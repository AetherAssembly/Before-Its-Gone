appId: com.beforeitsgone.app
productName: Before Its Gone
icon: assets/app-icon.png
directories:
  output: ../../release
files:
  - dist/**/*
extraResources:
  - from: ../web/dist
    to: web-dist
    filter:
      - '**/*'
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: 'before-its-gone-setup-${version}.exe'
portable:
  artifactName: 'before-its-gone-portable-${version}.exe'
publish: []
generateUpdatesFilesForAllChannels: false
