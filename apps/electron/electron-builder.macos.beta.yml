appId: com.beforeitsgone.beta
productName: Before Its Gone Beta
icon: assets/app-icon.png
directories:
  output: ../../release
files:
  - dist/**/*
extraResources:
  - from: ../web/dist
    to: web-dist
    filter:
      - '**/*'
artifactName: 'before-its-gone-beta-${version}-mac.${ext}'
mac:
  target:
    - dmg
    - zip
  category: public.app-category.utilities
  minimumSystemVersion: '12.0'
dmg:
  title: Before Its Gone Beta
  window:
    width: 540
    height: 380
publish:
  provider: github
  owner: AetherAssembly
  repo: Before-Its-Gone
  channel: beta
generateUpdatesFilesForAllChannels: true
