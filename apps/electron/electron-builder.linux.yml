appId: com.beforeitsgone.app
productName: Before-Its-Gone
icon: assets/app-icon.png
artifactName: before-its-gone-${version}-${arch}.${ext}
directories:
  output: ../../release
files:
  - dist/**/*
extraResources:
  - from: ../web/dist
    to: web-dist
    filter:
      - '**/*'
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Utility
  executableName: before-its-gone
  syncDesktopName: true
  desktop:
    entry:
      Name: "Before It's Gone"
publish:
  provider: github
  owner: AetherAssembly
  repo: Before-Its-Gone
generateUpdatesFilesForAllChannels: true
