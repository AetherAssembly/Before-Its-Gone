appId: com.beforeitsgone.app
productName: Before Its Gone
icon: assets/app-icon.png
directories:
  output: ../../release
files:
  - dist/**/*
extraResources:
  - from: ../web/dist
    to: web-dist
    filter:
      - '**/*'
mac:
  target:
    - dmg
    - zip
  category: public.app-category.utilities
  minimumSystemVersion: '12.0'
dmg:
  title: Before Its Gone
  window:
    width: 540
    height: 380
publish: []
generateUpdatesFilesForAllChannels: false
