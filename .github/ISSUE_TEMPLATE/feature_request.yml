name: Feature Request
description: Suggest a new feature or improvement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Describe it below. The more context you give, the easier it is to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or frustration this would address.
      placeholder: "e.g. I always forget to update expiry dates when I restock the same item…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you currently use, or other approaches that could work.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, screenshots, links to similar features in other apps, etc.
    validations:
      required: false
