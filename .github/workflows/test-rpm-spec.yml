name: Test RPM spec (Linux distros)

on:
  push:
    branches:
      - main
    paths:
      - docs/packaging/linux/fedora/before-its-gone.spec
  pull_request:
    branches:
      - main
    paths:
      - docs/packaging/linux/fedora/before-its-gone.spec
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-rpm:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - fedora:42
          - quay.io/centos/centos:stream9
          - opensuse/leap:15.6
          - mageia:9

    steps:
      - name: Install git & tar (needed by actions/checkout)
        run: |
          if command -v dnf >/dev/null; then
            dnf install -y git tar
          elif command -v zypper >/dev/null; then
            zypper --non-interactive install git tar
          elif command -v urpmi >/dev/null; then
            urpmi --auto git tar
          else
            echo "No supported package manager found" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: |
          if command -v dnf >/dev/null; then
            dnf install -y --allowerasing rpm-build curl cpio
          elif command -v zypper >/dev/null; then
            zypper --non-interactive install rpm-build curl cpio
          elif command -v urpmi >/dev/null; then
            urpmi --auto rpm-build curl cpio
          else
            echo "No supported package manager found" >&2
            exit 1
          fi

      - name: Fetch upstream source rpm
        run: |
          topdir=$(rpm --eval '%_topdir')
          mkdir -p "$topdir/SOURCES"
          spec=docs/packaging/linux/fedora/before-its-gone.spec
          version=$(grep -m1 '^Version:' "$spec" | awk '{print $2}')
          # The spec declares Source0/Source1 unconditionally (x86_64 and
          # aarch64), so rpmbuild needs both present regardless of which
          # arch is actually being built here.
          for arch in x86_64 aarch64; do
            curl -fsSL \
              -o "$topdir/SOURCES/before-its-gone-${version}-${arch}.rpm" \
              "https://github.com/AetherAssembly/Before-Its-Gone/releases/download/v${version}/before-its-gone-${version}-${arch}.rpm"
          done

      - name: Build rpm
        run: rpmbuild -ba docs/packaging/linux/fedora/before-its-gone.spec
