name: Test RPM spec (Linux distros)

on:
  push:
    branches:
      - main
    paths:
      - docs/packaging/linux/fedora/before-its-gone.spec
  pull_request:
    branches:
      - main
    paths:
      - docs/packaging/linux/fedora/before-its-gone.spec
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build-rpm:
    name: Build RPM artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RPM
        run: npm run package:linux:rpm

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: rpm-artifact
          path: release/*.rpm
          retention-days: 1

  test-spec:
    name: ${{ matrix.image }}
    needs: build-rpm
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - fedora:42
          - quay.io/centos/centos:stream9
          - opensuse/leap:15.6
          - mageia:9

    steps:
      - name: Install git & tar (needed by actions/checkout)
        run: |
          if command -v dnf >/dev/null; then
            dnf install -y git tar
          elif command -v zypper >/dev/null; then
            zypper --non-interactive install git tar
          elif command -v urpmi >/dev/null; then
            urpmi --auto git tar
          else
            echo "No supported package manager found" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Install build tools
        run: |
          if command -v dnf >/dev/null; then
            dnf install -y --allowerasing rpm-build cpio hicolor-icon-theme
          elif command -v zypper >/dev/null; then
            zypper --non-interactive install rpm-build cpio hicolor-icon-theme
          elif command -v urpmi >/dev/null; then
            urpmi --auto rpm-build cpio hicolor-icon-theme
          else
            echo "No supported package manager found" >&2
            exit 1
          fi

      - name: Download RPM artifact
        uses: actions/download-artifact@v8
        with:
          name: rpm-artifact
          path: rpm-artifacts/

      - name: Place sources for rpmbuild
        run: |
          topdir=$(rpm --eval '%_topdir')
          mkdir -p "$topdir/SOURCES"
          spec=docs/packaging/linux/fedora/before-its-gone.spec
          version=$(grep -m1 '^Version:' "$spec" | awk '{print $2}')
          cp rpm-artifacts/before-its-gone-${version}-x86_64.rpm \
            "$topdir/SOURCES/before-its-gone-${version}-x86_64.rpm"
          # aarch64 placeholder; %%ifarch aarch64 won't execute on x86_64 runners
          cp rpm-artifacts/before-its-gone-${version}-x86_64.rpm \
            "$topdir/SOURCES/before-its-gone-${version}-aarch64.rpm"

      - name: List extracted RPM contents
        run: |
          spec=docs/packaging/linux/fedora/before-its-gone.spec
          version=$(grep -m1 '^Version:' "$spec" | awk '{print $2}')
          cd /tmp && mkdir rpmcheck && cd rpmcheck
          rpm2cpio $GITHUB_WORKSPACE/rpm-artifacts/before-its-gone-${version}-x86_64.rpm | cpio -idm
          find . | sort

      - name: Build rpm
        run: rpmbuild -bb docs/packaging/linux/fedora/before-its-gone.spec