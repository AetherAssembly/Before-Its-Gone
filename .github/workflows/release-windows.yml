name: Release — Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        id: build
        run: npm run package:windows
        continue-on-error: true

      - name: Upload Windows artifacts
        if: steps.build.outcome == 'success'
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          name: Before It's Gone ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.exe

      - name: Create draft release (build failed)
        if: steps.build.outcome == 'failure'
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          name: Before It's Gone ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}

      - name: Inject Windows SHAs into release notes
        if: steps.build.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const crypto = require('crypto');
            const fs = require('fs');
            const path = require('path');

            async function sha256(filepath) {
              const hash = crypto.createHash('sha256');
              const stream = fs.createReadStream(filepath);
              return new Promise((resolve, reject) => {
                stream.on('data', chunk => hash.update(chunk));
                stream.on('end', () => resolve(hash.digest('hex')));
                stream.on('error', reject);
              });
            }

            const files = fs.readdirSync('release');
            const installer = files.find(f => f.endsWith('.exe') && f.includes('setup'));
            const portable  = files.find(f => f.endsWith('.exe') && f.includes('portable'));

            const tag = context.ref.replace('refs/tags/', '');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              per_page: 10,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) throw new Error(`No release found for tag ${tag}`);

            let body = release.body;
            if (!body || !body.trim()) {
              body = fs.readFileSync('.github/RELEASE_TEMPLATE.md', 'utf8');
            }

            if (installer) body = body.replace('EXE_SHA256',      await sha256(path.join('release', installer)));
            if (portable)  body = body.replace('PORTABLE_SHA256', await sha256(path.join('release', portable)));

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              release_id: release.id,
              body,
            });

      - name: Build status notice
        if: steps.build.outcome == 'failure'
        run: echo "Windows build failed — draft release created without binary artifacts."
