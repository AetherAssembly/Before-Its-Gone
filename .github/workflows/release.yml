name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --draft \
            --title "Before It's Gone ${{ steps.tag.outputs.tag }}" \
            --notes "Release in progress..."

  build:
    name: Build & upload (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            publish_script: publish:linux
          - os: ubuntu-24.04-arm
            publish_script: publish:linux:arm64
          - os: macos-latest
            publish_script: publish:macos
          - os: windows-latest
            publish_script: publish:windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build:electron

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm --workspace apps/electron run ${{ matrix.publish_script }}

  publish-packages:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@aetherAssembly'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build packages
        run: npm run build --workspace packages/core --workspace packages/ui

      - name: Publish core
        run: npm publish --workspace packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ui
        run: npm publish --workspace packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attach-pkgbuild:
    name: Generate & attach PKGBUILD
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all AppImages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release download "$TAG" --pattern "*.AppImage" --dir ./appimages

      - name: Generate PKGBUILD from template
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          # pacman pkgver can't contain hyphens; replace with dots
          PKGVER="${VER//-/.}"

          # Map electron-builder ${arch} suffixes (as they appear in filenames) to pacman arch names.
          # electron-builder expands ${arch} as: x86_64, arm64, armv7l, ia32 on Linux.
          declare -A ARCH_MAP=(
            [x86_64]=x86_64
            [arm64]=aarch64
            [aarch64]=aarch64
            [armv7l]=armv7h
            [ia32]=i686
          )

          ARCH_LIST=()
          SOURCE_LINES=()
          SUM_LINES=()

          for appimage in ./appimages/*.AppImage; do
            filename="$(basename "$appimage")"
            # Filename format: before-its-gone-<ver>-<eb-arch>.AppImage
            # Extract the arch suffix (last dash-separated component before .AppImage)
            eb_arch="${filename%.AppImage}"
            eb_arch="${eb_arch##*-}"
            pacman_arch="${ARCH_MAP[$eb_arch]:-}"

            if [[ -z "$pacman_arch" ]]; then
              echo "Warning: unknown arch suffix '$eb_arch' in $filename; skipping"
              continue
            fi

            sha=$(sha256sum "$appimage" | awk '{print $1}')
            ARCH_LIST+=("'$pacman_arch'")
            # Use \$ (not \\$) so bash writes a literal $, which makepkg then expands
            # Use $filename directly for the URL so it matches the actual release asset name
            SOURCE_LINES+=("source_${pacman_arch}=(\"\${pkgname}-\${pkgver}-${pacman_arch}.AppImage::https://github.com/AetherAssembly/Before-Its-Gone/releases/download/\${_tag}/${filename}\")")
            SUM_LINES+=("sha256sums_${pacman_arch}=('${sha}')")
          done

          if [[ ${#ARCH_LIST[@]} -eq 0 ]]; then
            echo "Error: no AppImages found in release" && exit 1
          fi

          ARCH_LIST_STR="${ARCH_LIST[*]}"
          SOURCES_STR="$(printf '%s\n' "${SOURCE_LINES[@]}")"$'\n'"$(printf '%s\n' "${SUM_LINES[@]}")"

          # Use awk to replace multi-line placeholder without sed range issues
          awk \
            -v pkgver="$PKGVER" \
            -v tag="$TAG" \
            -v arch_list="$ARCH_LIST_STR" \
            -v arch_sources="$SOURCES_STR" \
            '{
              gsub(/PKGVER_PLACEHOLDER/, pkgver)
              gsub(/TAG_PLACEHOLDER/, tag)
              gsub(/ARCH_LIST_PLACEHOLDER/, arch_list)
              gsub(/ARCH_SOURCES_PLACEHOLDER/, arch_sources)
              print
            }' PKGBUILD > PKGBUILD.release

          echo "--- Generated PKGBUILD ---"
          head -20 PKGBUILD.release

      - name: Upload PKGBUILD to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" PKGBUILD.release#PKGBUILD --clobber

  publish-docker:
    name: Publish Docker image (GHCR)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/before-its-gone
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ghcr
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish release
    needs: [build, publish-packages, attach-pkgbuild, publish-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release download "$TAG" --dir ./artifacts

      - name: Build release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
          export TAG VER PREV_TAG
          python3 << 'PYEOF'
          import os, re, hashlib, glob
          from pathlib import Path

          tag      = os.environ['TAG']
          ver      = os.environ['VER']
          prev_tag = os.environ.get('PREV_TAG', '').strip()
          artifacts_dir = Path('./artifacts')
          base_url = f"https://github.com/AetherAssembly/Before-Its-Gone/releases/download/{tag}"

          # --- Parse CHANGELOG for this version ---
          changelog = Path('CHANGELOG.md').read_text()
          section_m = re.search(
              r'## \[' + re.escape(ver) + r'\].*?\n(.*?)(?=\n---\n|\n## \[|\Z)',
              changelog, re.DOTALL
          )
          section = section_m.group(1).strip() if section_m else ''

          def subsection(text, heading):
              m = re.search(r'### ' + heading + r'\n(.*?)(?=\n### |\Z)', text, re.DOTALL)
              return m.group(1).strip() if m else ''

          added   = subsection(section, 'Added')
          fixed   = subsection(section, 'Fixed')
          changed = subsection(section, 'Changed')

          # --- SHA256 helpers ---
          def sha256(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return h.hexdigest()

          def find_one(*patterns):
              for pat in patterns:
                  matches = sorted(glob.glob(str(artifacts_dir / pat)))
                  if matches:
                      return Path(matches[0])
              return None

          def row(label, path):
              if not path or not path.exists():
                  return None
              url = f"{base_url}/{path.name}"
              return f"| {label} | [{path.name}]({url}) | `{sha256(path)}` |"

          table_rows = list(filter(None, [
              row("Linux (x64) AppImage",   find_one("*x86_64.AppImage")),
              row("Linux (x64) .deb",       find_one("*amd64.deb")),
              row("Linux (x64) .rpm",       find_one("*x86_64.rpm")),
              row("Linux (arm64) AppImage", find_one("*arm64.AppImage")),
              row("Linux (arm64) .deb",     find_one("*arm64.deb")),
              row("Linux (arm64) .rpm",     find_one("*aarch64.rpm")),
              row("macOS DMG",              find_one("*.dmg")),
              row("Windows installer",      find_one("*setup*.exe", "*-installer.exe")),
              row("Windows portable",       find_one("*portable*.exe", "*Portable*.exe")),
          ]))

          pkgbuild = find_one("PKGBUILD")
          if pkgbuild:
              table_rows.append(
                  f"| Linux (x64) Arch PKGBUILD | [PKGBUILD]({base_url}/PKGBUILD) | - |"
              )

          compare_link = (
              f"https://github.com/AetherAssembly/Before-Its-Gone/compare/{prev_tag}...{tag}"
              if prev_tag else
              f"https://github.com/AetherAssembly/Before-Its-Gone/releases/tag/{tag}"
          )

          # --- Assemble body ---
          parts = [f"## Before It's Gone: {tag}", ""]

          if added:
              parts += ["### What's new", "", added, ""]
          if fixed:
              parts += ["### Bug fixes", "", fixed, ""]
          if changed:
              parts += ["### Changes", "", changed, ""]

          parts += [
              "---", "",
              "### Downloads", "",
              "| Platform | Format | SHA256 |",
              "|---|---|---|",
              *table_rows, "",
              "#### Verify a download", "",
              "```bash",
              f'sha256sum "before-its-gone-{ver}-x86_64.AppImage"',
              "```", "",
              "---", "",
              "### Linux notes", "",
              "**Already using a package repo?** Just run your normal update command — no download needed:", "",
              "- **Debian / Ubuntu / Raspberry Pi OS (apt):** `sudo apt update && sudo apt upgrade before-its-gone`",
              "- **Fedora / RHEL / CentOS Stream / Rocky / Alma (COPR):** `sudo dnf upgrade before-its-gone`",
              "- **openSUSE (OBS):** `sudo zypper update before-its-gone`",
              "- **Arch:** download the `PKGBUILD` attached below and run `makepkg -si`",
              "",
              "**First install or using AppImage?** Grab your build from the table above.",
              "Repo setup instructions are in the [README](https://github.com/AetherAssembly/Before-Its-Gone#download).", "",
              "**Wayland / X11 override (AppImage):**", "",
              "```bash",
              f"BIG_LINUX_DISPLAY_BACKEND=wayland ./before-its-gone-{ver}-x86_64.AppImage",
              f"BIG_LINUX_DISPLAY_BACKEND=x11    ./before-its-gone-{ver}-x86_64.AppImage",
              "```", "",
              "### macOS notes", "",
              "The app is not notarized, so macOS may show a **\"damaged\"** warning and refuse to open it.",
              "Run this command after mounting the DMG to strip the quarantine flag:", "",
              "```sh",
              f"xattr -d com.apple.quarantine \"/Applications/Before Its Gone.app\"",
              "```", "",
              "### Windows notes", "",
              "If SmartScreen warns on the installer, click **More info** then **Run anyway**."
              " The app is not yet code-signed.", "",
              "---", "",
              "### Full changelog", "",
              f"<!-- {compare_link} -->",
          ]

          Path('release-body.md').write_text('\n'.join(parts))
          print("release-body.md written")
          PYEOF

      - name: Publish release with notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF#refs/tags/}" \
            --notes-file release-body.md \
            --draft=false
