name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --draft \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes

  build:
    name: Build & upload (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            publish_script: publish:linux
          - os: ubuntu-24.04-arm
            publish_script: publish:linux:arm64
          - os: macos-latest
            publish_script: publish:macos
          - os: windows-latest
            publish_script: publish:windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build:electron

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm --workspace apps/electron run ${{ matrix.publish_script }}

  publish-packages:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@aetherAssembly'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build packages
        run: npm run build --workspace packages/core --workspace packages/ui

      - name: Publish core
        run: npm publish --workspace packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ui
        run: npm publish --workspace packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attach-pkgbuild:
    name: Generate & attach PKGBUILD
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all AppImages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release download "$TAG" --pattern "*.AppImage" --dir ./appimages

      - name: Generate PKGBUILD from template
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          # pacman pkgver can't contain hyphens; replace with dots
          PKGVER="${VER//-/.}"

          # Map electron-builder arch suffixes to pacman arch names
          declare -A ARCH_MAP=(
            [x64]=x86_64
            [arm64]=aarch64
            [ia32]=i686
            [armv7l]=armv7h
          )

          ARCH_LIST=()
          SOURCE_LINES=()
          SUM_LINES=()

          for appimage in ./appimages/*.AppImage; do
            filename="$(basename "$appimage")"
            # Filename format: before-its-gone-<ver>-<eb-arch>.AppImage
            eb_arch="${filename%.AppImage}"
            eb_arch="${eb_arch##*-}"
            pacman_arch="${ARCH_MAP[$eb_arch]}"

            if [[ -z "$pacman_arch" ]]; then
              echo "Warning: unknown arch suffix '$eb_arch' in $filename; skipping"
              continue
            fi

            sha=$(sha256sum "$appimage" | awk '{print $1}')
            ARCH_LIST+=("'$pacman_arch'")
            SOURCE_LINES+=("source_${pacman_arch}=(\"\\${pkgname}-\\${pkgver}-${pacman_arch}.AppImage::https://github.com/AetherAssembly/Before-Its-Gone/releases/download/\\${_tag}/before-its-gone-${VER}-${eb_arch}.AppImage\")")
            SUM_LINES+=("sha256sums_${pacman_arch}=('${sha}')")
          done

          if [[ ${#ARCH_LIST[@]} -eq 0 ]]; then
            echo "Error: no AppImages found in release" && exit 1
          fi

          ARCH_LIST_STR="${ARCH_LIST[*]}"
          SOURCES_STR="$(printf '%s\n' "${SOURCE_LINES[@]}")"$'\n'"$(printf '%s\n' "${SUM_LINES[@]}")"

          # Use awk to replace multi-line placeholder without sed range issues
          awk \
            -v pkgver="$PKGVER" \
            -v tag="$TAG" \
            -v arch_list="$ARCH_LIST_STR" \
            -v arch_sources="$SOURCES_STR" \
            '{
              gsub(/PKGVER_PLACEHOLDER/, pkgver)
              gsub(/TAG_PLACEHOLDER/, tag)
              gsub(/ARCH_LIST_PLACEHOLDER/, arch_list)
              gsub(/ARCH_SOURCES_PLACEHOLDER/, arch_sources)
              print
            }' PKGBUILD > PKGBUILD.release

          echo "--- Generated PKGBUILD ---"
          head -20 PKGBUILD.release

      - name: Upload PKGBUILD to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" PKGBUILD.release#PKGBUILD --clobber

  publish-release:
    name: Publish release
    needs: [build, publish-packages, attach-pkgbuild]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF#refs/tags/}" --draft=false
