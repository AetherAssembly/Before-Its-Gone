name: Version consistency check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Versions match across files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compare versions
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          SPEC_VER=$(grep -m1 '^Version:' docs/packaging/linux/fedora/before-its-gone.spec | awk '{print $2}')
          CHANGELOG_VER=$(grep -m1 '^## \[' CHANGELOG.md | sed 's/## \[\([^]]*\)\].*/\1/')

          # Strip prerelease suffix for spec comparison — RPM Version: cannot
          # contain hyphens, so the spec always carries the base version
          # (e.g. 1.3.1) while package.json may carry 1.3.1-beta.1.
          PKG_VER_BASE="${PKG_VER%%-*}"

          echo "package.json      : $PKG_VER (base: $PKG_VER_BASE)"
          echo "spec file         : $SPEC_VER"
          echo "CHANGELOG.md      : $CHANGELOG_VER"

          FAIL=false
          # Skip the stable spec check on prerelease versions — the stable spec
          # only gets bumped on stable releases, so it will always lag behind
          # during a beta cycle.
          if [[ "$PKG_VER" != *"-"* ]]; then
            if [ "$PKG_VER_BASE" != "$SPEC_VER" ]; then
              echo "::error file=docs/packaging/linux/fedora/before-its-gone.spec::spec Version: ($SPEC_VER) does not match package.json base version ($PKG_VER_BASE)"
              FAIL=true
            fi
          else
            echo "spec file         : skipped (prerelease build)"
          fi
          # CHANGELOG top entry must match the full package.json version
          # including any prerelease suffix (e.g. 1.3.1-beta.1).
          if [ "$PKG_VER" != "$CHANGELOG_VER" ]; then
            echo "::error file=CHANGELOG.md::CHANGELOG.md top entry ($CHANGELOG_VER) does not match package.json ($PKG_VER)"
            FAIL=true
          fi

          # If this is a prerelease, also check the beta spec. The beta spec
          # stores the base version in Version: and the prerelease identifier
          # in %global prerelease, e.g. Version: 1.3.1 + prerelease beta.1
          # reconstructs to 1.3.1-beta.1.
          if [[ "$PKG_VER" == *"-"* ]]; then
            BETA_SPEC="docs/packaging/linux/fedora/beta/before-its-gone.spec"
            BETA_SPEC_VER=$(grep -m1 '^Version:' "$BETA_SPEC" | awk '{print $2}')
            BETA_PRERELEASE=$(grep -m1 '^%global prerelease' "$BETA_SPEC" | awk '{print $3}')
            BETA_FULL_VER="${BETA_SPEC_VER}-${BETA_PRERELEASE}"

            echo "beta spec         : $BETA_FULL_VER (Version: $BETA_SPEC_VER, prerelease: $BETA_PRERELEASE)"

            if [ "$BETA_FULL_VER" != "$PKG_VER" ]; then
              echo "::error file=$BETA_SPEC::beta spec reconstructed version ($BETA_FULL_VER) does not match package.json ($PKG_VER)"
              FAIL=true
            fi
          fi

          if [ "$FAIL" = "true" ]; then exit 1; fi
          echo "All versions consistent: $PKG_VER"
