name: Release — Linux (arm64)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-arm64:
    name: Build Linux (arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Linux arm64 artifacts
        id: build
        run: npm run package:linux
        continue-on-error: true

      - name: Upload arm64 artifacts
        if: steps.build.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Before It's Gone ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm

      - name: Create draft release (build failed)
        if: steps.build.outcome == 'failure'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Before It's Gone ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}

      - name: Inject arm64 SHAs into release notes
        if: steps.build.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const crypto = require('crypto');
            const fs = require('fs');
            const path = require('path');

            async function sha256(filepath) {
              const hash = crypto.createHash('sha256');
              const stream = fs.createReadStream(filepath);
              return new Promise((resolve, reject) => {
                stream.on('data', chunk => hash.update(chunk));
                stream.on('end', () => resolve(hash.digest('hex')));
                stream.on('error', reject);
              });
            }

            const files = fs.readdirSync('release');
            const appimage = files.find(f => f.endsWith('.AppImage'));
            const deb      = files.find(f => f.endsWith('.deb'));
            const rpm      = files.find(f => f.endsWith('.rpm'));

            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag,
            });

            let body = release.body;
            if (!body || !body.trim()) {
              body = fs.readFileSync('.github/RELEASE_TEMPLATE.md', 'utf8');
            }

            if (appimage) body = body.replace('APPIMAGE_ARM64_SHA256', await sha256(path.join('release', appimage)));
            if (deb)      body = body.replace('DEB_ARM64_SHA256',      await sha256(path.join('release', deb)));
            if (rpm)      body = body.replace('RPM_ARM64_SHA256',      await sha256(path.join('release', rpm)));

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              release_id: release.id,
              body,
            });

      - name: Build status notice
        if: steps.build.outcome == 'failure'
        run: echo "arm64 build failed — no artifacts uploaded."
