name: Release — macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts
        id: build
        run: npm run package:macos
        continue-on-error: true

      - name: Upload macOS artifacts
        if: steps.build.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Before It's Gone ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.dmg
            release/*.zip

      - name: Create draft release (build failed)
        if: steps.build.outcome == 'failure'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Before It's Gone ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}

      - name: Inject macOS SHAs into release notes
        if: steps.build.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const crypto = require('crypto');
            const fs = require('fs');
            const path = require('path');

            async function sha256(filepath) {
              const hash = crypto.createHash('sha256');
              const stream = fs.createReadStream(filepath);
              return new Promise((resolve, reject) => {
                stream.on('data', chunk => hash.update(chunk));
                stream.on('end', () => resolve(hash.digest('hex')));
                stream.on('error', reject);
              });
            }

            const files = fs.readdirSync('release');
            const dmg = files.find(f => f.endsWith('.dmg'));

            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag,
            });

            let body = release.body;
            if (!body || !body.trim()) {
              body = fs.readFileSync('.github/RELEASE_TEMPLATE.md', 'utf8');
            }

            if (dmg) body = body.replace('DMG_SHA256', await sha256(path.join('release', dmg)));

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              release_id: release.id,
              body,
            });

      - name: Build status notice
        if: steps.build.outcome == 'failure'
        run: echo "macOS build failed — draft release created without binary artifacts."
